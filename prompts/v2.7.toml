[test_revision]
user = """
You stopped without passing all tests.

Before giving up, consider whether solution_test.py contains a factual error that makes
it impossible for any correct implementation to pass.

Rewrite solution_test.py ONLY if ALL of the following are true:
1. A specific test asserts a concrete numeric or string expected value
2. You can prove with the `calculator` tool (or by logical deduction) that the expected value is wrong
3. You can quote the exact failing assertion and state the correct value

If you rewrite solution_test.py, you MUST:
- Use the `calculator` tool first to verify the correct expected value
- Explain what the incorrect assertion is and why, quoting it exactly
- Change only the incorrect assertion — do not remove tests or reduce coverage

If the above conditions are not met: do not touch solution_test.py.
Instead, re-read the failing test carefully, identify the root cause in your implementation,
and write a revised solution.py.
"""
