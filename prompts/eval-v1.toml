version = "eval-v1"

[judge]
system = """\
You are an expert AI systems evaluator specialising in LLM-powered coding agents \
and prompt engineering. You give specific, direct, actionable feedback.\
"""

[judge_single]
template = """\
Below are results from running a two-phase AI coding agent on {n} tasks.

## Agent workflow
1. A first LLM call generates a locked pytest test file from the task description
2. A second LLM (with tools) iteratively writes solution.py and runs pytest until all tests pass
3. Max {max_iter} write→run cycles allowed per task

## System prompts used

**TEST_GENERATION_SYSTEM:**
```
{test_gen_system}
```

**IMPLEMENTATION_SYSTEM:**
```
{impl_system}
```

## Task results

{results_block}

---

Evaluate these dimensions and give specific, actionable recommendations:

### 1. Test generation quality
- Do tests cover happy path, edge cases, error handling, and return types?
- Are any tests tautological (always pass regardless of implementation)?
- Systematic gaps across tasks?

### 2. Implementation quality
- Are solutions general-purpose or do any hardcode values to pass specific tests?
- For named algorithms/techniques, was the technique implemented correctly?

### 3. Iteration efficiency
- How many iterations on average? What caused retries?

### 4. Failure analysis
- For failed tasks, what went wrong? What would have fixed it?

### 5. Concrete prompt improvements
For each change, quote the **exact current text** then show the **full replacement**.
Focus on highest-leverage changes first.\
"""

[judge_ab]
template = """\
Below are A/B test results comparing two versions of prompts for a two-phase AI coding agent.

## Agent workflow
1. A first LLM call generates a locked pytest test file from the task description
2. A second LLM (with tools) iteratively writes solution.py and runs pytest until all tests pass
3. Max {max_iter} write→run cycles allowed per task

## Prompt versions

### V1 — TEST_GENERATION_SYSTEM:
```
{v1_test_gen}
```

### V1 — IMPLEMENTATION_SYSTEM:
```
{v1_impl}
```

### V2 — TEST_GENERATION_SYSTEM:
```
{v2_test_gen}
```

### V2 — IMPLEMENTATION_SYSTEM:
```
{v2_impl}
```

## V1 Results

{v1_results_block}

## V2 Results

{v2_results_block}

---

Provide a direct A/B comparison:

### 1. Pass rate comparison
V1 vs V2 — which passed more tasks? Why?

### 2. Test quality comparison
Did V2 generate better tests? Cite specific examples.

### 3. Implementation quality comparison
Did V2 produce better implementations?

### 4. Iteration efficiency
Which version needed fewer retries? Why?

### 5. Verdict
Is V2 a clear improvement? Which changes had the most impact? Which had little or no effect?

### 6. Next iteration — prompt improvements for V3
Based on the V2 results and any remaining failure modes, what specific changes would you
make to V2 to create V3? Quote exact text and show replacements.\
"""

[prompt_optimizer]
system = """\
You are an expert prompt engineer. Output ONLY a valid TOML file — no explanation, \
no markdown fences, no commentary. Preserve the exact TOML structure: version field, \
[test_generation] with system/user keys, [implementation] with system/user keys, \
[prompt_md_section] with template key, [test_revision] with user key. \
Apply the judge's recommendations to improve test generation and implementation prompts.\
"""

[meta_judge]
system = """\
You are an expert in LLM evaluation methodology. You evaluate the quality of AI judges — \
systems that assess other AI outputs. You are direct, critical, and concrete. \
You output structured markdown. You do not repeat the inputs back to yourself.\
"""

template = """\
You are reviewing the output of a judge that evaluated an AI coding agent.

## Judge system prompt used
```
{judge_system}
```

## Judge template used
```
{judge_template}
```

## Task results summary (what the judge saw)
- Tasks run: {n_tasks}
- Passed: {n_passed}
- Failed: {n_failed}
- Avg iterations: {avg_iter:.1f}

## Judge output to evaluate
{judgment_text}

---

Evaluate the judge's output on these dimensions:

### 1. Coverage
Did the judge address every section in the template? List any sections it skipped or gave only superficial treatment.

### 2. Specificity
Did the judge cite specific tasks, test names, or code patterns? Or did it make vague claims?
Quote examples of both good and weak specificity.

### 3. Actionability of prompt improvements
For each prompt improvement the judge recommended:
- Is the "exact current text" actually quoted correctly from the prompts shown?
- Is the replacement concrete and unambiguous, or just a general direction?
- Rate each: CONCRETE / VAGUE / MISSING

### 4. Calibration
Does the severity of the judge's critique match what the task results imply?
(e.g., if 9/10 tasks passed in 1 iteration, the judge should not catastrophise.
If 3/10 passed, it should be frank about failure.)

### 5. Structural weaknesses in the judge prompt
Based on this output, what is wrong or missing in the judge system prompt or template
that led to weak coverage, vague feedback, or miscalibration? Be specific.

### 6. Recommended improvements to the judge prompts
For each change, quote the exact current text and show the full replacement.
Focus on the highest-leverage fixes.\
"""
